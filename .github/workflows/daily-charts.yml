name: Daily Weekly Charts

on:
  schedule:
    # 한국시간(KST) 오전 6:30 = UTC 21:30 (전날)
    - cron: "13 20 * * *"
  workflow_dispatch:   # 버튼으로 수동 실행도 가능

jobs:
  send-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -fv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance matplotlib requests

      - name: Generate and send charts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python generate_charts.py
